<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#1A2B3A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1100 260) rotate(135) scale(560 420)">
      <stop stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.25" fill="#FFFFFF" fill-opacity="0.10"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- Subtle skyline silhouette (abstract, original) -->
  <path d="M0 700 C 160 660, 260 680, 360 650 C 470 618, 560 640, 680 610 C 820 572, 940 640, 1060 610 C 1210 572, 1320 620, 1440 590 C 1510 572, 1560 580, 1600 570 V900 H0 Z" fill="#000000" fill-opacity="0.18"/>
  <path d="M0 735 C 190 700, 320 730, 470 700 C 610 672, 760 730, 910 700 C 1050 672, 1220 720, 1360 690 C 1480 664, 1560 680, 1600 670 V900 H0 Z" fill="#000000" fill-opacity="0.14"/>

  <!-- Soft dot texture -->
  <rect width="1600" height="900" fill="url(#dots)"/>

  <!-- A few diagonal “tool” strokes -->
  <path d="M210 210 L520 420" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="10" stroke-linecap="round"/>
  <path d="M1180 580 L1420 720" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="12" stroke-linecap="round"/>
  <path d="M980 120 L1180 240" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="8" stroke-linecap="round"/>
</svg>
